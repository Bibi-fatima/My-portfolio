<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<footer style="position:relative;z-index:1;max-width:1200px;margin:0 auto;width:100%;padding:clamp(40px,6vw,56px) clamp(20px,5vw,64px) clamp(28px,4vw,40px);border-top:1px solid var(--stroke);display:flex;flex-direction:column;gap:clamp(24px,4vw,32px);font-family:'Inter',system-ui,sans-serif">

  <div style="display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:20px">
    <p style="font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(1.2rem,2.6vw,1.6rem);line-height:1.3;color:rgba(245,245,245,.92);max-width:420px">Interactive experiences for ideas worth understanding.</p>
    <nav style="display:flex;flex-wrap:wrap;gap:4px">
      <a href="Homepage.dc.html" data-footer-nav="home" style="font-size:13px;color:var(--muted);border-radius:999px;padding:8px 14px;transition:all .25s var(--ease)">Home</a>
      <a href="Experiences.dc.html" data-footer-nav="experiences" style="font-size:13px;color:var(--muted);border-radius:999px;padding:8px 14px;transition:all .25s var(--ease)">Experiences</a>
      <a href="About.dc.html" data-footer-nav="about" style="font-size:13px;color:var(--muted);border-radius:999px;padding:8px 14px;transition:all .25s var(--ease)">About</a>
      <a href="Contact.dc.html" data-footer-nav="contact" style="font-size:13px;color:var(--muted);border-radius:999px;padding:8px 14px;transition:all .25s var(--ease)">Contact</a>
    </nav>
  </div>

  

  <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;padding-top:clamp(20px,3vw,28px);border-top:1px solid var(--stroke)">
    <span style="font-size:12px;color:var(--muted)">© 2026 — Bibi Fatima Naaz. All rights reserved.</span>
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:10px">
      
      <a href="https://www.linkedin.com/in/bibi-fatima-naaz/" target="_blank" style="font-size:12px;color:var(--muted);border:1px solid var(--stroke);border-radius:999px;padding:7px 14px;transition:all .25s var(--ease)">LinkedIn</a>
    </div>
  </div>

</footer>

</x-dc>
<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 220 },
  &quot;activePage&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;home&quot;, &quot;experiences&quot;, &quot;about&quot;, &quot;contact&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Nav&quot; },
  &quot;name&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Bibi Fatima Naaz&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; },
  &quot;email&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;bibifnaaz37@gmail.com&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; },
  &quot;availabilityStatus&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Available for projects&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Content&quot; }
}">
class Component extends DCLogic {
  componentDidMount() {
    const style = document.createElement('style');
    style.textContent = '@keyframes footer-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}@media (prefers-reduced-motion:reduce){[data-footer-nav]{transition:none}}';
    document.head.appendChild(style);
    this._style = style;

    const active = this.props.activePage;
    const links = Array.from(document.querySelectorAll('[data-footer-nav]'));
    links.forEach((a) => {
      const on = a.getAttribute('data-footer-nav') === active;
      a.style.color = on ? 'var(--text)' : 'var(--muted)';
      a.style.background = on ? 'rgba(255,255,255,.06)' : 'transparent';
    });
  }

  componentWillUnmount() {
    if (this._style && this._style.parentNode) this._style.parentNode.removeChild(this._style);
  }

  renderVals() {
    return {
      name: this.props.name ?? 'Placeholder — name',
      email: this.props.email ?? 'bibifnaaz37@email.com',
      availabilityStatus: this.props.availabilityStatus ?? 'Placeholder — availability status',
      year: new Date().getFullYear(),
      openEmail: (e) => { e.preventDefault(); window.open('mailto:bibifnaaz37@gmail.com'); },
    };
  }
}

</script>
</body>
</html>
