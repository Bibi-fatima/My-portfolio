<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Hole · Gravitational Lensing</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;cursor:none;font-family:'Space Mono',monospace;}
canvas{display:block;}
#cursor{position:fixed;width:8px;height:8px;background:#ff6b35;border-radius:50%;pointer-events:none;z-index:99;transform:translate(-50%,-50%);mix-blend-mode:screen;}
#cursor-ring{position:fixed;width:28px;height:28px;border:1px solid rgba(255,107,53,0.4);border-radius:50%;pointer-events:none;z-index:98;transform:translate(-50%,-50%);transition:all 0.15s ease;}
#label{position:fixed;top:32px;left:40px;z-index:10;pointer-events:none;}
#label h1{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.3em;text-transform:uppercase;color:rgba(255,255,255,0.9);}
#label p{font-size:9px;letter-spacing:0.2em;color:rgba(255,107,53,0.7);margin-top:4px;text-transform:uppercase;}
#stats{position:fixed;top:32px;right:40px;text-align:right;z-index:10;pointer-events:none;font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.3);line-height:2;}
#stats span{color:rgba(255,107,53,0.8);}
#hint{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.2);pointer-events:none;z-index:10;}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="label"><h1>Event Horizon</h1><p>Gravitational Lensing Simulation</p></div>
<div id="stats">Mass: <span id="s-mass">∞</span><br>Hawking Temp: <span id="s-temp">~0 K</span><br>Particles: <span id="s-parts">8,000</span></div>
<div id="hint">move cursor · particles fall into the void</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');

let W = canvas.width = innerWidth;
let H = canvas.height = innerHeight;
let mx = W/2, my = H/2, rmx = W/2, rmy = H/2;

// Cursor
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function animCursor() {
  rmx += (mx-rmx)*0.12; rmy += (my-rmy)*0.12;
  cursor.style.left = mx+'px'; cursor.style.top = my+'px';
  cursorRing.style.left = rmx+'px'; cursorRing.style.top = rmy+'px';
  requestAnimationFrame(animCursor);
}
animCursor();

window.addEventListener('resize', () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; gl.viewport(0,0,W,H); });

// --- WebGL Shader Setup ---
const vsSource = `#version 300 es
precision highp float;
in vec2 a_position;
out vec2 v_uv;
void main(){v_uv=a_position*0.5+0.5;gl_Position=vec4(a_position,0,1);}
`;

const fsSource = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

#define PI 3.14159265358979

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}

float noise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}

vec3 accretionDisk(float r, float theta, float time){
  float band = sin(theta*3.0 - time*2.0 + r*8.0)*0.5+0.5;
  float turbulence = noise(vec2(r*4.0-time*0.5, theta*2.0))*0.6+0.4;
  float glow = exp(-pow((r-0.32)*12.0,2.0));
  
  vec3 innerCol = vec3(1.0,0.55,0.05);
  vec3 outerCol = vec3(0.9,0.15,0.0);
  vec3 hotspot  = vec3(1.0,0.95,0.7);
  
  vec3 col = mix(outerCol, innerCol, band);
  col = mix(col, hotspot, glow*turbulence*0.7);
  float brightness = glow * turbulence * (0.8+band*0.4);
  return col * brightness * 3.5;
}

void main(){
  vec2 uv = (v_uv - 0.5) * vec2(u_resolution.x/u_resolution.y, 1.0);
  vec2 mpos = (u_mouse/u_resolution - 0.5) * vec2(u_resolution.x/u_resolution.y, 1.0);
  mpos.y *= -1.0;

  float r = length(uv);
  float theta = atan(uv.y, uv.x);
  float time = u_time;

  // ---- Gravitational Lensing distortion ----
  float bhRadius = 0.08;
  float lensStrength = 0.018;
  
  // Lens around black hole center
  vec2 lensUV = uv;
  float distToBH = r;
  if(distToBH > bhRadius){
    float lens = lensStrength / (distToBH * distToBH);
    lensUV += normalize(uv) * (-lens);
  }
  
  // Mouse gravitational pull — secondary lens
  vec2 toMouse = uv - mpos;
  float dm = length(toMouse);
  float mouseLens = 0.006 / max(dm*dm, 0.002);
  lensUV -= normalize(toMouse) * mouseLens * smoothstep(0.6,0.0,dm);

  // Photon sphere - thin bright ring
  float photonR = bhRadius * 1.5;
  float photonRing = exp(-pow((r - photonR)*80.0,2.0));
  
  // ---- Star field (using lensed UVs) ----
  vec3 stars = vec3(0);
  for(int i=0;i<4;i++){
    float scale = 80.0 + float(i)*120.0;
    vec2 sp = lensUV * scale + float(i)*7.3;
    float s = hash(floor(sp));
    float twinkle = sin(time*(0.5+s*2.0)+s*6.28)*0.3+0.7;
    float starGlow = smoothstep(0.97,1.0,s) * twinkle;
    stars += vec3(starGlow * mix(0.6,1.0,hash(floor(sp)+0.5)),
                  starGlow * mix(0.7,1.0,hash(floor(sp)+1.5)),
                  starGlow * mix(0.8,1.0,hash(floor(sp)+2.5)));
  }
  
  // ---- Nebula background ----
  float nb1 = noise(lensUV*3.0 + time*0.03);
  float nb2 = noise(lensUV*6.0 - time*0.02 + 4.0);
  vec3 nebula = vec3(0.02,0.0,0.05)*nb1 + vec3(0.05,0.01,0.0)*nb2;
  nebula *= 2.5;
  
  // ---- Accretion disk ----
  float diskR = r;
  float diskTheta = theta + time * 0.4;
  float inDisk = smoothstep(0.38,0.22,diskR) * smoothstep(0.14,0.22,diskR);
  inDisk *= (1.0 - smoothstep(0.0,0.3,abs(sin(theta)*0.3))); // flatten to disk
  vec3 disk = accretionDisk(diskR, diskTheta, time) * inDisk;
  
  // ---- Relativistic jet ----
  float jetAngle = abs(sin(theta - PI/2.0));
  float jetR = r;
  float jet = exp(-jetR*6.0) * smoothstep(0.08,0.0,jetAngle) * 2.5;
  vec3 jetCol = vec3(0.3,0.6,1.0) * jet;

  // ---- Compose ----
  vec3 col = nebula + stars + disk + jetCol;
  
  // Photon ring glow
  col += vec3(1.0,0.7,0.3)*photonRing*2.0;
  
  // Black hole shadow
  float shadow = smoothstep(bhRadius*1.1, bhRadius*0.8, r);
  col *= (1.0 - shadow);
  
  // Pure black center
  col *= smoothstep(bhRadius*0.85, bhRadius*1.05, r);
  
  // Outer vignette
  col *= 1.0 - smoothstep(0.4, 0.9, r)*0.6;
  
  // Tone map
  col = col / (col + 0.8);
  col = pow(col, vec3(0.85));
  
  fragColor = vec4(col, 1.0);
}
`;

function createShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
function createProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, fs);
  gl.linkProgram(p);
  return p;
}

const prog = createProgram(
  createShader(gl.VERTEX_SHADER, vsSource),
  createShader(gl.FRAGMENT_SHADER, fsSource)
);

const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);

const aPos = gl.getAttribLocation(prog, 'a_position');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uTime = gl.getUniformLocation(prog, 'u_time');
const uRes  = gl.getUniformLocation(prog, 'u_resolution');
const uMouse= gl.getUniformLocation(prog, 'u_mouse');

gl.useProgram(prog);

// --- Particle system overlay (canvas 2D) ---
const c2 = document.createElement('canvas');
c2.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:5;';
c2.width = W; c2.height = H;
document.body.appendChild(c2);
const ctx = c2.getContext('2d');

window.addEventListener('resize', () => { c2.width = innerWidth; c2.height = innerHeight; });

const NPARTS = 8000;
const px = new Float32Array(NPARTS);
const py = new Float32Array(NPARTS);
const pvx = new Float32Array(NPARTS);
const pvy = new Float32Array(NPARTS);
const page = new Float32Array(NPARTS);
const phue = new Float32Array(NPARTS);

function spawnParticle(i) {
  const angle = Math.random() * Math.PI * 2;
  const dist = W * (0.3 + Math.random() * 0.5);
  px[i] = W/2 + Math.cos(angle) * dist;
  py[i] = H/2 + Math.sin(angle) * dist;
  pvx[i] = (Math.random()-.5)*0.5;
  pvy[i] = (Math.random()-.5)*0.5;
  page[i] = Math.random() * 300;
  phue[i] = Math.random()*60 + 10; // orange-ish
}

for (let i = 0; i < NPARTS; i++) spawnParticle(i);

let t0 = performance.now();

function drawParticles(time) {
  ctx.clearRect(0, 0, c2.width, c2.height);
  const bhX = c2.width / 2, bhY = c2.height / 2;
  const bhR = Math.min(c2.width, c2.height) * 0.08;

  for (let i = 0; i < NPARTS; i++) {
    page[i]++;
    // Gravity toward black hole center
    const dx = bhX - px[i], dy = bhY - py[i];
    const dist = Math.sqrt(dx*dx + dy*dy);
    const grav = 1200 / (dist * dist + 200);
    pvx[i] += dx / dist * grav;
    pvy[i] += dy / dist * grav;

    // Mouse gravity
    const mdx = mx - px[i], mdy = my - py[i];
    const mdist = Math.sqrt(mdx*mdx+mdy*mdy);
    const mgrav = 400 / (mdist * mdist + 500);
    pvx[i] += mdx / mdist * mgrav;
    pvy[i] += mdy / mdist * mgrav;

    // Slight orbital tangent force
    pvx[i] += -dy/dist * 0.08;
    pvy[i] +=  dx/dist * 0.08;

    pvx[i] *= 0.985; pvy[i] *= 0.985;
    px[i] += pvx[i]; py[i] += pvy[i];

    if (dist < bhR * 0.7 || page[i] > 400) spawnParticle(i);

    const alpha = Math.min(1, (1 - dist/(c2.width*0.8)) * 0.7 + 0.1);
    const size = Math.max(0.3, 1.5 - dist/c2.width);
    const speed = Math.sqrt(pvx[i]*pvx[i]+pvy[i]*pvy[i]);
    const brightness = Math.min(90, 50 + speed * 3);

    ctx.beginPath();
    ctx.arc(px[i], py[i], size, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${phue[i]+speed*2},100%,${brightness}%,${alpha})`;
    ctx.fill();
  }
}

function render(ts) {
  requestAnimationFrame(render);
  const t = (ts - t0) * 0.001;
  gl.viewport(0, 0, W, H);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uRes, W, H);
  gl.uniform2f(uMouse, mx, H - my);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  drawParticles(t);

  document.getElementById('s-temp').textContent = (1.2e-8 / (1 + Math.sin(t*0.1)*0.1e-9)).toExponential(2) + ' K';
}

requestAnimationFrame(render);
</script>
</body>
</html>
