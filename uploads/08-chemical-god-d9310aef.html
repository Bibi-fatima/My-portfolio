<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEMICAL GOD — Invent New Matter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000408; font-family: 'Space Mono', monospace; cursor: none; user-select: none; }
  #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #cursor { position: fixed; width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.9); box-shadow: 0 0 8px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.3); transform: translate(-50%,-50%); pointer-events: none; z-index: 9999; transition: width .15s, height .15s, background .2s, box-shadow .2s; }
  #cursor.drag { width: 18px; height: 18px; background: rgba(0,255,200,0.9); box-shadow: 0 0 14px rgba(0,255,200,0.8), 0 0 40px rgba(0,255,200,0.3); }
  #cursor.hover { width: 14px; height: 14px; background: rgba(255,110,200,0.9); box-shadow: 0 0 10px rgba(255,110,200,0.8), 0 0 28px rgba(255,110,200,0.3); }
  #title { position: fixed; top: 26px; left: 30px; font-family: 'Syne', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: .38em; text-transform: uppercase; color: rgba(255,255,255,0.18); pointer-events: none; z-index: 100; }
  #log { position: fixed; top: 26px; right: 30px; width: 195px; pointer-events: none; z-index: 100; }
  .log-item { font-size: 8px; letter-spacing: .15em; padding: 3px 0; opacity: 0; transform: translateX(8px); transition: opacity .55s, transform .55s; text-align: right; }
  .log-item.show { opacity: 1; transform: translateX(0); }
  #count { position: fixed; bottom: 26px; left: 30px; font-size: 8px; letter-spacing: .2em; color: rgba(255,255,255,0.18); z-index: 100; pointer-events: none; }
  #reset { position: fixed; bottom: 26px; right: 30px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.2); font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .22em; text-transform: uppercase; padding: 8px 16px; cursor: none; z-index: 100; transition: border-color .3s, color .3s; }
  #reset:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.6); }
  #chaos { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: .42em; text-transform: uppercase; color: rgba(255,255,255,0); pointer-events: none; z-index: 200; text-align: center; transition: color 1.2s; white-space: nowrap; }
  #chaos.show { color: rgba(255,255,255,0.38); }
  #hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%, 70px); font-size: 8px; letter-spacing: .35em; text-transform: uppercase; color: rgba(255,255,255,0.15); pointer-events: none; z-index: 100; transition: opacity 2.5s; white-space: nowrap; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="cursor"></div>
<div id="title">Chemical God</div>
<div id="log"></div>
<div id="count">0 elements discovered</div>
<button id="reset">reset void</button>
<div id="chaos"></div>
<div id="hint">drag particles together</div>
<script>
(function(){
'use strict';

const CV = document.getElementById('canvas');
const cx = CV.getContext('2d');
const curEl = document.getElementById('cursor');
const logEl = document.getElementById('log');
const countEl = document.getElementById('count');
const chaosEl = document.getElementById('chaos');
const hintEl = document.getElementById('hint');

let W = CV.width = innerWidth;
let H = CV.height = innerHeight;

// ── WORLD ──────────────────────────────────────────────────────────
let particles = [], bonds = [], fx = [];
let tick = 0, discovered = new Set(), discCount = 0;
let dragging = null, dOffX = 0, dOffY = 0;
let mX = W/2, mY = H/2;

// ── CHAOS ──────────────────────────────────────────────────────────
let G = {x:0, y:0.018};
let TS = 1; // time scale
let lastChaos = -9999;

// ── BASE ELEMENTS ──────────────────────────────────────────────────
const BASES = [
  {name:'Aethon', col:'#00ffcc', en:0.70, st:0.80, re:0.60, af:0.50, vo:0.15, r:7},
  {name:'Pyrex',  col:'#ff6ec7', en:0.90, st:0.30, re:0.90, af:0.30, vo:0.75, r:8},
  {name:'Lumis',  col:'#ffe566', en:0.50, st:0.90, re:0.30, af:0.80, vo:0.05, r:9},
  {name:'Vordex', col:'#6ef4ff', en:0.60, st:0.60, re:0.70, af:0.60, vo:0.35, r:7},
  {name:'Nekron', col:'#b06eff', en:0.80, st:0.40, re:0.80, af:0.40, vo:0.55, r:8},
  {name:'Solvite',col:'#ff8c42', en:0.40, st:0.70, re:0.50, af:0.70, vo:0.25, r:7},
];
let DEFS = [...BASES];
let nextId = BASES.length;

// ── UTILS ──────────────────────────────────────────────────────────
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function dist2(ax,ay,bx,by){return (ax-bx)**2+(ay-by)**2;}
function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function lerpc(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ── PARTICLE ────────────────────────────────────────────────────────
class P {
  constructor(x,y,di){
    this.x=x; this.y=y;
    this.vx=(Math.random()-.5)*.9; this.vy=(Math.random()-.5)*.9;
    this.di=di; this.d=DEFS[di];
    this.r=this.d.r+Math.random()*2;
    this.id=Math.random().toString(36).slice(2);
    this.age=0; this.alpha=0;
    this.ph=Math.random()*Math.PI*2;
    this.trail=[];
    this.bonded=new Set();
    this.held=false;
    this.state='normal'; // normal|unstable|alive|replicating
    this.st=0; // state timer
    this.showLabel=false;
  }
  get col(){return this.d.col;}

  update(dt){
    this.age+=dt;
    this.alpha=Math.min(1,this.alpha+dt*.035);
    this.ph+=dt*.038*(1+this.d.en);
    this.st-=dt;

    this.trail.push({x:this.x,y:this.y,a:.3});
    if(this.trail.length>16) this.trail.shift();
    this.trail.forEach(t=>t.a*=.86);

    if(!this.held){
      this.vx+=G.x*dt*TS;
      this.vy+=G.y*dt*TS;
      const damp=.989-this.d.vo*.004;
      this.vx*=damp; this.vy*=damp;
      this.x+=this.vx*TS; this.y+=this.vy*TS;

      const pad=this.r;
      if(this.x<pad){this.x=pad;this.vx*=-.65;}
      if(this.x>W-pad){this.x=W-pad;this.vx*=-.65;}
      if(this.y<pad){this.y=pad;this.vy*=-.65;}
      if(this.y>H-pad){this.y=H-pad;this.vy*=-.65;}
    }
    if(this.state==='alive'){
      const t=this.age*.011;
      this.vx+=Math.sin(t*1.4+this.id.charCodeAt(0)*.1)*.022;
      this.vy+=Math.cos(t*.8+this.id.charCodeAt(1)*.1)*.022;
    }
    if(this.state==='unstable'&&this.st>0){
      this.vx+=(Math.random()-.5)*.38;
      this.vy+=(Math.random()-.5)*.38;
    }
  }

  draw(){
    cx.save();
    // trail
    for(let i=0;i<this.trail.length;i++){
      const t=this.trail[i], f=i/this.trail.length;
      cx.beginPath();
      cx.arc(t.x,t.y,this.r*.3*f,0,Math.PI*2);
      cx.fillStyle=rgba(this.col,t.a*f*.45);
      cx.fill();
    }
    const pulse=.14*Math.sin(this.ph);
    const r=this.r*(1+pulse)*this.alpha;
    let gs=r*3.8, ga=.17+pulse*.07;
    if(this.state==='unstable') ga+=.28*Math.abs(Math.sin(tick*.28));
    if(this.state==='alive'){gs*=1.5; ga+=.1;}

    // outer glow
    const g1=cx.createRadialGradient(this.x,this.y,r*.15,this.x,this.y,gs);
    g1.addColorStop(0,rgba(this.col,ga*2.8));
    g1.addColorStop(.4,rgba(this.col,ga));
    g1.addColorStop(1,rgba(this.col,0));
    cx.beginPath(); cx.arc(this.x,this.y,gs,0,Math.PI*2);
    cx.fillStyle=g1; cx.fill();

    // core
    const g2=cx.createRadialGradient(this.x-r*.28,this.y-r*.28,r*.08,this.x,this.y,r);
    g2.addColorStop(0,rgba('#ffffff',.92*this.alpha));
    g2.addColorStop(.35,rgba(this.col,.96*this.alpha));
    g2.addColorStop(1,rgba(this.col,.5*this.alpha));
    cx.beginPath(); cx.arc(this.x,this.y,r,0,Math.PI*2);
    cx.fillStyle=g2; cx.fill();

    if(this.showLabel){
      cx.font=`7px 'Space Mono',monospace`;
      cx.fillStyle=rgba(this.col,.7*this.alpha);
      cx.textAlign='center';
      cx.fillText(this.d.name,this.x,this.y-r-9);
    }
    cx.restore();
  }
}

// ── BOND ─────────────────────────────────────────────────────────────
class Bond {
  constructor(a,b,type){
    this.a=a; this.b=b; this.type=type;
    this.age=0; this.alpha=0;
    this.str=Math.min(a.d.st,b.d.st);
    this.len=dist(a,b);
  }
  update(dt){
    this.age+=dt;
    this.alpha=Math.min(1,this.alpha+dt*.04);
    const d=dist(this.a,this.b);
    const f=(d-this.len*1.45)*.011*this.str;
    const ang=Math.atan2(this.b.y-this.a.y,this.b.x-this.a.x);
    if(!this.a.held){this.a.vx+=Math.cos(ang)*f; this.a.vy+=Math.sin(ang)*f;}
    if(!this.b.held){this.b.vx-=Math.cos(ang)*f; this.b.vy-=Math.sin(ang)*f;}
  }
  draw(){
    const pulse=this.type==='stable'?.5+.5*Math.sin(this.age*.065):.28+.72*Math.abs(Math.sin(this.age*.2));
    cx.save();
    cx.globalAlpha=this.alpha*.5*pulse;
    cx.strokeStyle=lerpc(this.a.col,this.b.col,.5);
    cx.lineWidth=this.type==='crystal'?1.8:1;
    if(this.type==='chain') cx.setLineDash([3,6]);
    cx.beginPath(); cx.moveTo(this.a.x,this.a.y); cx.lineTo(this.b.x,this.b.y); cx.stroke();
    cx.setLineDash([]);
    // midpoint dot
    const mx2=(this.a.x+this.b.x)/2, my2=(this.a.y+this.b.y)/2;
    cx.globalAlpha=this.alpha*.28*pulse;
    cx.beginPath(); cx.arc(mx2,my2,2.2,0,Math.PI*2);
    cx.fillStyle=lerpc(this.a.col,this.b.col,.5); cx.fill();
    cx.restore();
  }
}

// ── EFFECTS ───────────────────────────────────────────────────────────
class Explosion {
  constructor(x,y,col,intensity){
    this.x=x; this.y=y; this.col=col;
    this.life=1; this.sr=0; this.sa=intensity;
    this.sparks=[];
    const n=18+Math.floor(intensity*28);
    for(let i=0;i<n;i++){
      const ang=Math.random()*Math.PI*2, spd=1.5+Math.random()*8*intensity;
      this.sparks.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,r:.8+Math.random()*2.5});
    }
  }
  update(dt){
    this.life-=dt*.022; this.sr+=dt*4.5; this.sa*=.91;
    this.sparks.forEach(s=>{
      s.x+=s.vx*TS; s.y+=s.vy*TS;
      s.vx*=.93; s.vy*=.93; s.life-=dt*.028;
    });
    this.sparks=this.sparks.filter(s=>s.life>0);
  }
  draw(){
    if(this.sa>.01){
      cx.save(); cx.strokeStyle=rgba(this.col,this.sa*.65); cx.lineWidth=2;
      cx.beginPath(); cx.arc(this.x,this.y,this.sr,0,Math.PI*2); cx.stroke(); cx.restore();
    }
    this.sparks.forEach(s=>{
      cx.save();
      const g=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*3.5);
      g.addColorStop(0,rgba('#ffffff',s.life*.88));
      g.addColorStop(.3,rgba(this.col,s.life*.7));
      g.addColorStop(1,rgba(this.col,0));
      cx.beginPath(); cx.arc(s.x,s.y,s.r*3.5,0,Math.PI*2);
      cx.fillStyle=g; cx.fill(); cx.restore();
    });
  }
  get done(){return this.life<=0;}
}

class Ripple {
  constructor(x,y,col){this.x=x;this.y=y;this.col=col;this.r=0;this.life=1;}
  update(dt){this.r+=dt*2.8; this.life-=dt*.024;}
  draw(){
    cx.save(); cx.strokeStyle=rgba(this.col,this.life*.55); cx.lineWidth=1.4;
    cx.beginPath(); cx.arc(this.x,this.y,this.r,0,Math.PI*2); cx.stroke(); cx.restore();
  }
  get done(){return this.life<=0;}
}

class TextPop {
  constructor(x,y,text,col){this.x=x;this.y=y;this.text=text;this.col=col;this.life=1;this.vy=-.45;}
  update(dt){this.life-=dt*.02; this.y+=this.vy; this.vy*=.97;}
  draw(){
    cx.save(); cx.globalAlpha=this.life;
    cx.font=`7px 'Space Mono',monospace`;
    cx.fillStyle=rgba(this.col,.9); cx.textAlign='center';
    cx.fillText(this.text,this.x,this.y); cx.restore();
  }
  get done(){return this.life<=0;}
}

class Replicate {
  constructor(x,y,col){
    this.x=x;this.y=y;this.col=col;this.life=1;this.rings=[{r:0,l:1}];this.rt=0;
  }
  update(dt){
    this.life-=dt*.011; this.rt-=dt;
    if(this.rt<=0){this.rings.push({r:0,l:1}); this.rt=20;}
    this.rings.forEach(rg=>{rg.r+=dt*1.7; rg.l-=dt*.023;});
    this.rings=this.rings.filter(rg=>rg.l>0);
  }
  draw(){
    this.rings.forEach(rg=>{
      cx.save(); cx.strokeStyle=rgba(this.col,rg.l*.38);
      cx.lineWidth=.8; cx.setLineDash([4,10]);
      cx.beginPath(); cx.arc(this.x,this.y,rg.r,0,Math.PI*2); cx.stroke();
      cx.setLineDash([]); cx.restore();
    });
  }
  get done(){return this.life<=0;}
}

// ── REACTIONS ─────────────────────────────────────────────────────────
function react(a,b){
  if(a.bonded.has(b.id)||b.bonded.has(a.id)) return;
  const cv=(a.d.vo+b.d.vo)/2;
  const cr=(a.d.re+b.d.re)/2;
  const cs=(a.d.st+b.d.st)/2;
  const af=1-Math.abs(a.d.af-b.d.af);
  const ed=Math.abs(a.d.en-b.d.en);
  const roll=Math.random();

  if(cv>.62&&cr>.68&&roll<.78){boom(a,b,cv);return;}
  if(cs>.62&&af>.58&&roll<.78){makeBond(a,b,'stable');return;}
  if(cs>.52&&ed<.22&&a.bonded.size<3&&b.bonded.size<3&&roll<.6){makeBond(a,b,'crystal');return;}
  if(cr>.48&&a.bonded.size<2&&b.bonded.size<2&&roll<.55){makeBond(a,b,'chain');return;}
  if(cr>.58&&af>.38&&roll<.44){newElement(a,b);return;}
  if(a.d.en+b.d.en>1.18&&cs>.48&&roll<.09){replicate(a,b);return;}
  if(cv>.38&&roll<.5){
    a.state='unstable'; a.st=90+Math.random()*60;
    b.state='unstable'; b.st=90+Math.random()*60;
    fx.push(new Ripple(a.x,a.y,a.col)); fx.push(new Ripple(b.x,b.y,b.col));
    if(roll<.12) cascade(a);
  }
}

function boom(a,b,intensity){
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  removePart(a); removePart(b);
  fx.push(new Explosion(mx,my,'#ff6ec7',intensity));
  fx.push(new Explosion(mx,my,'#ffe566',intensity*.55));
  fx.push(new Ripple(mx,my,'#ffffff'));
  // shockwave
  particles.forEach(p=>{
    const d=Math.hypot(p.x-mx,p.y-my);
    if(d<210){
      const ang=Math.atan2(p.y-my,p.x-mx);
      const f=(210-d)/210*5.5*intensity;
      p.vx+=Math.cos(ang)*f; p.vy+=Math.sin(ang)*f;
      if(Math.random()<.22){p.state='unstable';p.st=55;}
    }
  });
  if(Math.random()<.45&&particles.length<30){
    const np=new P(mx+(Math.random()-.5)*25,my+(Math.random()-.5)*25,Math.floor(Math.random()*DEFS.length));
    np.vx=(Math.random()-.5)*3.5; np.vy=(Math.random()-.5)*3.5;
    particles.push(np);
  }
}

function makeBond(a,b,type){
  bonds.push(new Bond(a,b,type));
  a.bonded.add(b.id); b.bonded.add(a.id);
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  fx.push(new Ripple(mx,my,lerpc(a.col,b.col,.5)));
  const lbl=type==='stable'?'◈ bond':type==='crystal'?'◇ lattice':'— chain';
  fx.push(new TextPop(mx,my-22,lbl,lerpc(a.col,b.col,.5)));
  if(type==='crystal'&&particles.length>2&&Math.random()<.3){
    const third=particles.find(p=>p!==a&&p!==b&&!p.bonded.has(a.id));
    if(third){third.vx+=(mx-third.x)*.007; third.vy+=(my-third.y)*.007;}
  }
}

function newElement(a,b){
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  const nd={
    name:`X-${String(++nextId).padStart(2,'0')}`,
    col:lerpc(a.col,b.col,.25+Math.random()*.5),
    en:clamp((a.d.en+b.d.en)/2+(Math.random()-.5)*.3,.1,1),
    st:clamp((a.d.st+b.d.st)/2+(Math.random()-.5)*.25,.1,1),
    re:clamp((a.d.re+b.d.re)/2+(Math.random()-.5)*.22,.1,1),
    af:clamp((a.d.af+b.d.af)/2+(Math.random()-.5)*.22,.1,1),
    vo:clamp((a.d.vo+b.d.vo)/2+(Math.random()-.5)*.18,0,1),
    r:6+Math.random()*4,
  };
  DEFS.push(nd);
  removePart(a); removePart(b);
  const np=new P(mx,my,DEFS.length-1);
  np.vx=(Math.random()-.5)*1.4; np.vy=(Math.random()-.5)*1.4;
  np.showLabel=true;
  particles.push(np);
  for(let i=0;i<5;i++) setTimeout(()=>fx.push(new Ripple(mx,my,nd.col)),i*160);
  fx.push(new TextPop(mx,my-32,`✦ ${nd.name}`,nd.col));
  if(!discovered.has(nd.name)){
    discovered.add(nd.name); discCount++;
    countEl.textContent=`${discCount} element${discCount>1?'s':''} discovered`;
    addLog(nd.name,nd.col);
  }
  setTimeout(()=>{np.showLabel=false;},3200);
}

function replicate(a,b){
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  a.state='replicating'; b.state='replicating';
  fx.push(new Replicate(mx,my,a.col));
  fx.push(new TextPop(mx,my-36,'⟳ replicating','#b0ffc0'));
  setTimeout(()=>{
    if(particles.length<32){
      const ang=Math.random()*Math.PI*2, sp=55+Math.random()*40;
      const np=new P(mx+Math.cos(ang)*sp,my+Math.sin(ang)*sp,a.di);
      np.vx=Math.cos(ang)*1.1; np.vy=Math.sin(ang)*1.1;
      particles.push(np);
    }
  },1100);
}

function cascade(src){
  fx.push(new TextPop(src.x,src.y-40,'⚡ cascade','#ffe566'));
  let delay=0;
  particles.forEach(p=>{
    if(p!==src&&Math.hypot(p.x-src.x,p.y-src.y)<270){
      delay+=75;
      setTimeout(()=>{
        if(particles.includes(p)){p.state='unstable';p.st=65; fx.push(new Ripple(p.x,p.y,p.col));}
      },delay);
    }
  });
}

function removePart(p){
  bonds=bonds.filter(b=>{
    if(b.a===p||b.b===p){b.a.bonded.delete(b.b.id);b.b.bonded.delete(b.a.id);return false;}
    return true;
  });
  const i=particles.indexOf(p);
  if(i>-1) particles.splice(i,1);
  if(dragging===p){dragging=null;curEl.classList.remove('drag');}
}

// ── CHAOS EVENTS ────────────────────────────────────────────────────
const EVENTS=[
  {name:'gravity inverted',fn(){G={x:0,y:-.026};setTimeout(()=>{G={x:0,y:.018};},8000);}},
  {name:'zero gravity',fn(){G={x:0,y:0};setTimeout(()=>{G={x:0,y:.018};},7000);}},
  {name:'time fracture',fn(){TS=.2;setTimeout(()=>{TS=2.8;},2200);setTimeout(()=>{TS=1;},5000);}},
  {name:'structures awakened',fn(){bonds.forEach(b=>{b.a.state='alive';b.a.st=700;b.b.state='alive';b.b.st=700;});particles.forEach(p=>{if(Math.random()<.38){p.state='alive';p.st=700;}});}},
  {name:'lateral drift',fn(){G={x:.03,y:.004};setTimeout(()=>{G={x:0,y:.018};},6500);}},
  {name:'mass destabilization',fn(){particles.forEach(p=>{p.state='unstable';p.st=160+Math.random()*100;});}},
];

function maybeChaos(){
  if(tick-lastChaos<850) return;
  if(Math.random()>.013) return;
  if(particles.length<4) return;
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  lastChaos=tick;
  ev.fn();
  chaosEl.textContent=ev.name.toUpperCase();
  chaosEl.classList.add('show');
  setTimeout(()=>chaosEl.classList.remove('show'),2600);
}

// ── COLLISION & PHYSICS ────────────────────────────────────────────
let lastCC=0;
function collide(){
  if(tick-lastCC<3) return;
  lastCC=tick;
  for(let i=0;i<particles.length;i++){
    for(let j=i+1;j<particles.length;j++){
      const a=particles[i], b=particles[j];
      const d=dist(a,b), minD=a.r+b.r+5;
      if(d<minD){
        const ang=Math.atan2(b.y-a.y,b.x-a.x), sep=(minD-d)*.5;
        a.x-=Math.cos(ang)*sep; a.y-=Math.sin(ang)*sep;
        b.x+=Math.cos(ang)*sep; b.y+=Math.sin(ang)*sep;
        const relSpd=Math.hypot(a.vx-b.vx,a.vy-b.vy);
        const thresh=.75+(1-(a.d.re+b.d.re)/2)*2;
        if(relSpd>thresh) react(a,b);
        else{
          const nx=Math.cos(ang), ny=Math.sin(ang);
          const dv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
          if(dv<0){
            const r=.5;
            a.vx+=dv*nx*r; a.vy+=dv*ny*r;
            b.vx-=dv*nx*r; b.vy-=dv*ny*r;
          }
        }
      }
      if(d<155){
        const f=(155-d)/155*.0045*a.d.af*b.d.af;
        const ang=Math.atan2(b.y-a.y,b.x-a.x);
        if(!a.held){a.vx+=Math.cos(ang)*f; a.vy+=Math.sin(ang)*f;}
        if(!b.held){b.vx-=Math.cos(ang)*f; b.vy-=Math.sin(ang)*f;}
      }
    }
  }
}

function updateBonds(dt){
  bonds=bonds.filter(b=>{
    if(!particles.includes(b.a)||!particles.includes(b.b)){
      b.a.bonded.delete(b.b.id); b.b.bonded.delete(b.a.id); return false;
    }
    const d=dist(b.a,b.b);
    if(d>245||(d<9&&Math.random()<.025)){
      b.a.bonded.delete(b.b.id); b.b.bonded.delete(b.a.id);
      fx.push(new Ripple((b.a.x+b.b.x)/2,(b.a.y+b.b.y)/2,'#ffffff'));
      return false;
    }
    b.update(dt); return true;
  });
}

// ── DISCOVERY LOG ─────────────────────────────────────────────────
function addLog(name,col){
  const el=document.createElement('div');
  el.className='log-item'; el.style.color=col;
  el.textContent=`✦ ${name}`;
  logEl.prepend(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  const items=logEl.querySelectorAll('.log-item');
  if(items.length>7) items[items.length-1].remove();
}

// ── NEBULA BG ─────────────────────────────────────────────────────
const nebC=document.createElement('canvas');
nebC.width=W; nebC.height=H;
const nebX=nebC.getContext('2d');
for(let i=0;i<300;i++){
  const x=Math.random()*W,y=Math.random()*H,r=Math.random()*1.4,a=Math.random()*.3+.04;
  nebX.beginPath(); nebX.arc(x,y,r,0,Math.PI*2);
  nebX.fillStyle=`rgba(255,255,255,${a})`; nebX.fill();
}

// ── INIT ──────────────────────────────────────────────────────────
function init(){
  particles=[]; bonds=[]; fx=[];
  discovered.clear(); discCount=0;
  countEl.textContent='0 elements discovered';
  G={x:0,y:.018}; TS=1; lastChaos=-9999;
  logEl.innerHTML=''; DEFS=[...BASES]; nextId=BASES.length;
  for(let i=0;i<10;i++){
    const di=Math.floor(Math.random()*BASES.length);
    const m=90, np=new P(m+Math.random()*(W-m*2),m+Math.random()*(H-m*2),di);
    np.vx=(Math.random()-.5)*1.8; np.vy=(Math.random()-.5)*1.8;
    particles.push(np);
  }
  hintEl.style.opacity='1';
  setTimeout(()=>{hintEl.style.opacity='0';},4500);
}

// ── INPUT ─────────────────────────────────────────────────────────
let lastSpawn=0;
function onDown(ex,ey){
  let closest=null, cd=Infinity;
  particles.forEach(p=>{
    const d=dist2(p.x,p.y,ex,ey);
    if(d<(p.r+22)**2&&d<cd){closest=p;cd=d;}
  });
  if(closest){
    dragging=closest; closest.held=true;
    dOffX=ex-closest.x; dOffY=ey-closest.y;
    curEl.classList.add('drag');
  } else {
    const now=Date.now();
    if(now-lastSpawn>320&&particles.length<32){
      lastSpawn=now;
      const di=Math.floor(Math.random()*DEFS.length);
      const np=new P(ex,ey,di);
      np.vx=(Math.random()-.5)*1.5; np.vy=(Math.random()-.5)*1.5;
      particles.push(np);
      fx.push(new Ripple(ex,ey,np.col));
      hintEl.style.opacity='0';
    }
  }
}
function onMove(ex,ey){
  mX=ex; mY=ey;
  curEl.style.left=mX+'px'; curEl.style.top=mY+'px';
  if(dragging){dragging.x=mX-dOffX; dragging.y=mY-dOffY;}
  const near=particles.some(p=>dist2(p.x,p.y,mX,mY)<(p.r+18)**2);
  curEl.classList.toggle('hover',near&&!dragging);
}
function onUp(){
  if(dragging){
    dragging.held=false;
    dragging.vx=(mX-dragging.x-dOffX)*.4;
    dragging.vy=(mY-dragging.y-dOffY)*.4;
    curEl.classList.remove('drag');
    dragging=null;
  }
}

CV.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
CV.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
CV.addEventListener('mouseup',onUp);
CV.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];onDown(t.clientX,t.clientY);},{passive:false});
CV.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];onMove(t.clientX,t.clientY);},{passive:false});
CV.addEventListener('touchend',e=>{e.preventDefault();onUp();},{passive:false});

document.getElementById('reset').addEventListener('click',init);
document.getElementById('reset').addEventListener('mouseenter',()=>curEl.classList.add('hover'));
document.getElementById('reset').addEventListener('mouseleave',()=>curEl.classList.remove('hover'));

window.addEventListener('resize',()=>{W=CV.width=innerWidth;H=CV.height=innerHeight;});

// ── MAIN LOOP ─────────────────────────────────────────────────────
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/16.67,3); lastT=ts; tick++;

  cx.fillStyle='#000408'; cx.fillRect(0,0,W,H);
  cx.globalAlpha=.32; cx.drawImage(nebC,0,0); cx.globalAlpha=1;

  maybeChaos(); collide(); updateBonds(dt);

  fx=fx.filter(e=>!e.done);
  fx.forEach(e=>{e.update(dt);e.draw();});
  bonds.forEach(b=>b.draw());
  particles.forEach(p=>{p.update(dt);p.draw();});

  requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);
})();
</script>
