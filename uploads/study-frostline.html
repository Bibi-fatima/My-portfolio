<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frostline</title>
<style>*{margin:0;padding:0}body{background:#000;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H;
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
resize(); window.addEventListener('resize',resize);

// ─── DLA simulation ───────────────────────────────────────
const GS=201, HALF=100;
let grid=new Uint8Array(GS*GS);
let pts=[], maxR=0;

function runDLA(){
  grid.fill(0);
  pts=[];
  maxR=1;

  // Seed — slightly off-center for asymmetric feel
  const sx=HALF+Math.round((Math.random()-0.5)*8);
  const sy=HALF+Math.round((Math.random()-0.5)*8);
  grid[sy*GS+sx]=1;
  pts.push({gx:sx,gy:sy});

  const TARGET=380;
  let stuck=0, attempts=0;

  while(stuck<TARGET && attempts<TARGET*25){
    attempts++;
    const spawnR=Math.max(maxR+5, 8);
    const ang=Math.random()*Math.PI*2;
    let x=Math.round(sx+Math.cos(ang)*spawnR);
    let y=Math.round(sy+Math.sin(ang)*spawnR);
    x=Math.max(1,Math.min(GS-2,x));
    y=Math.max(1,Math.min(GS-2,y));
    const killR=spawnR+18;
    let walked=false;

    for(let step=0;step<5000;step++){
      // Check 4-neighbors
      let hit=false;
      for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]]){
        const nx=x+dx, ny=y+dy;
        if(nx>=0&&nx<GS&&ny>=0&&ny<GS&&grid[ny*GS+nx]){hit=true;break;}
      }
      if(hit){
        if(!grid[y*GS+x]){
          grid[y*GS+x]=1;
          pts.push({gx:x,gy:y});
          const r=Math.hypot(x-sx,y-sy);
          if(r>maxR) maxR=r;
          stuck++;
        }
        walked=true; break;
      }
      // Pure random walk — 4-connected
      const dir=Math.floor(Math.random()*4);
      if(dir===0) x=Math.min(GS-2,x+1);
      else if(dir===1) x=Math.max(1,x-1);
      else if(dir===2) y=Math.min(GS-2,y+1);
      else              y=Math.max(1,y-1);
      if(Math.hypot(x-sx,y-sy)>killR) break;
    }
  }
}
runDLA();

// ─── Rendering ────────────────────────────────────────────
const CYCLE=7200; // ms

function getP(){ return (performance.now()%CYCLE)/CYCLE; }
let lastP=1, cycleFloor=-1;

function drawLoop(){
  const now=performance.now();
  const p=getP();

  // New cycle: regenerate DLA during dark pause
  const cf=Math.floor(now/CYCLE);
  if(cf!==cycleFloor && p<0.07){
    cycleFloor=cf;
    runDLA();
  }

  ctx.fillStyle='#000208'; ctx.fillRect(0,0,W,H);

  if(pts.length<2){ requestAnimationFrame(drawLoop); return; }

  // Phase layout:
  // 0.00-0.06: dark (432ms)
  // 0.06-0.82: grow (5184ms) — slow-to-fast via easeIn
  // 0.82-0.91: hold full (648ms)
  // 0.91-1.00: dissolve (648ms)

  let showFrac=0, alpha=1;
  if(p<0.06){
    showFrac=0;
  } else if(p<0.82){
    const t=(p-0.06)/0.76;
    // EaseIn^1.5 → growth accelerates as cluster grows (mimics real DLA)
    showFrac=Math.pow(t,1.5);
  } else if(p<0.91){
    showFrac=1;
  } else {
    showFrac=1;
    alpha=1-((p-0.91)/0.09);
  }

  const showCount=Math.max(1, Math.floor(showFrac*(pts.length-1))+1);

  // Scale: map DLA grid to canvas
  const scale=Math.min(W,H)*0.80/GS;
  const ox=W/2-HALF*scale, oy=H/2-HALF*scale;

  ctx.globalAlpha=alpha;

  // Glow pass (shadow behind each particle)
  ctx.save();
  ctx.shadowBlur=18;
  ctx.shadowColor='rgba(140,210,255,0.65)';
  for(let i=0;i<showCount;i++){
    const pt=pts[i];
    const sx=ox+pt.gx*scale, sy=oy+pt.gy*scale;
    // Age-based color: seed=bright white, tips=cyan-blue
    const age=i/(pts.length-1||1);
    const l=Math.round(72+age*18);
    const s=Math.round(65+age*15);
    ctx.fillStyle=`hsl(198,${s}%,${l}%)`;
    const ps=Math.max(3.2, scale*1.0);
    ctx.fillRect(sx-ps/2,sy-ps/2,ps,ps);
  }
  ctx.restore();

  // Bright tip highlight: newest 8% of shown particles
  const tipStart=Math.max(0, showCount-Math.ceil(pts.length*0.08));
  ctx.shadowBlur=0;
  for(let i=tipStart;i<showCount;i++){
    const pt=pts[i];
    const sx=ox+pt.gx*scale, sy=oy+pt.gy*scale;
    ctx.fillStyle='rgba(225,248,255,0.92)';
    const ps=Math.max(3.8, scale*1.1);
    ctx.fillRect(sx-ps/2,sy-ps/2,ps,ps);
  }

  // Seed point glow
  if(pts.length>0){
    const sp=pts[0];
    const sx=ox+sp.gx*scale, sy=oy+sp.gy*scale;
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,16);
    g.addColorStop(0,'rgba(200,240,255,0.8)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(sx-16,sy-16,32,32);
  }

  ctx.globalAlpha=1;
  requestAnimationFrame(drawLoop);
}
drawLoop();
</script>
</body>
</html>
