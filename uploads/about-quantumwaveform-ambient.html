<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>about — quantum waveform ambient</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000810;overflow:hidden;}
canvas{display:block;position:fixed;top:0;left:0;}
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 180;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function glowTexture() {
  const c = document.createElement('canvas'); c.width = 32; c.height = 32;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(16,16,0,16,16,16);
  g.addColorStop(0,'#fff'); g.addColorStop(0.2,'rgba(100,200,255,0.8)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,32,32);
  return new THREE.CanvasTexture(c);
}

const count = 25000;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count*3);
const col = new Float32Array(count*3);
const cObj = new THREE.Color();

// Fixed x,z grid per particle — only y and color update over time
const px = new Float32Array(count);
const pz = new Float32Array(count);
for (let i = 0; i < count; i++) {
  px[i] = (Math.random() - 0.5) * 200;
  pz[i] = (Math.random() - 0.5) * 200;
}

function updateWave(t) {
  for (let i = 0; i < count; i++) {
    const x = px[i], z = pz[i];
    const y = Math.sin(x * 0.05 + t) * Math.cos(z * 0.05 + t * 0.7) * 20
            + Math.sin(x * 0.1 + t * 1.3) * 10;
    pos[i*3] = x; pos[i*3+1] = y; pos[i*3+2] = z;
    cObj.setHSL(0.6 + (y / 30) * 0.18, 0.7, 0.42);
    col[i*3] = cObj.r; col[i*3+1] = cObj.g; col[i*3+2] = cObj.b;
  }
}

updateWave(0);
geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));

const mat = new THREE.PointsMaterial({
  size: 1.5, vertexColors: true, map: glowTexture(),
  blending: THREE.AdditiveBlending, transparent: true, depthWrite: false
});
const sys = new THREE.Points(geo, mat);
sys.rotation.x = -0.75; // tilt wave surface toward camera
scene.add(sys);

let t = 0;
function anim() {
  requestAnimationFrame(anim);
  t += 0.02; // ~40% speed for ambient
  updateWave(t);
  geo.attributes.position.needsUpdate = true;
  geo.attributes.color.needsUpdate    = true;
  sys.rotation.y += 0.0006;
  renderer.render(scene, camera);
}
anim();
</script>
</body>
</html>
