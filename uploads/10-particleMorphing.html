<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Morphing · Cosmos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --accent: #c8a96e;
            --text: rgba(255,255,255,0.85);
            --muted: rgba(255,255,255,0.35);
        }

        body {
            overflow: hidden;
            background: #060409;
            font-family: 'DM Mono', monospace;
            cursor: none;
        }

        canvas { display: block; }

        /* Custom Cursor */
        #cursor {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, opacity 0.2s;
            mix-blend-mode: screen;
        }
        #cursor-ring {
            position: fixed;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(200,169,110,0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            transition: transform 0.12s ease, width 0.3s, height 0.3s, opacity 0.3s;
        }

        /* Top Header */
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 28px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
            pointer-events: none;
        }

        .wordmark {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 22px;
            letter-spacing: 0.12em;
            color: var(--text);
            line-height: 1;
        }
        .wordmark span {
            font-style: italic;
            color: var(--accent);
        }

        .status {
            text-align: right;
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            line-height: 1.8;
        }
        .status .shape-name {
            font-size: 13px;
            color: var(--accent);
            letter-spacing: 0.15em;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
        }

        /* Bottom Controls */
        #ui-container {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 0 40px 36px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
            z-index: 10;
            pointer-events: none;
        }

        .control-panel {
            display: flex;
            align-items: center;
            background: rgba(10,6,18,0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 6px;
            gap: 4px;
            pointer-events: auto;
        }

        .control-label {
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0 16px 0 18px;
            pointer-events: none;
        }

        button {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 10px 22px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            font-weight: 400;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: none;
            transition: all 0.3s ease;
            position: relative;
            white-space: nowrap;
        }

        button::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: transparent;
            transition: background 0.3s ease;
        }

        button:hover {
            color: #fff;
        }
        button:hover::before {
            background: rgba(255,255,255,0.06);
        }

        button.active {
            color: #0a0612;
            background: var(--accent);
        }
        button.active::before { display: none; }

        /* Particle count indicator */
        #particle-info {
            position: fixed;
            bottom: 36px;
            right: 40px;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            line-height: 1.8;
            text-align: right;
            pointer-events: none;
            z-index: 10;
        }

        /* Scroll hint */
        #hint {
            position: fixed;
            bottom: 36px;
            left: 40px;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            line-height: 1.8;
            pointer-events: none;
            z-index: 10;
        }

        /* Morph Progress Bar */
        #morph-bar {
            position: fixed;
            top: 0; left: 0;
            height: 2px;
            width: 0%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            z-index: 20;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        /* Fade in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #header, #ui-container, #particle-info, #hint {
            animation: fadeIn 1.4s ease both;
        }
        #header { animation-delay: 0.3s; }
        #ui-container { animation-delay: 0.6s; }
        #particle-info { animation-delay: 0.8s; }
        #hint { animation-delay: 1s; }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="morph-bar"></div>

<div id="header">
    <div class="wordmark">cos<span>mos</span></div>
    <div class="status">
        <div class="shape-name" id="current-shape">Galaxy</div>
        <div>Interactive · 3D</div>
        <div>Drag to rotate</div>
    </div>
</div>

<div id="ui-container">
    <div class="control-panel">
        <div class="control-label">Form</div>
        <button id="btn-galaxy" class="active">Galaxy</button>
        <button id="btn-saturn">Saturn</button>
        <button id="btn-flower">Flower</button>
        <button id="btn-fireworks">Fireworks</button>
        <button id="btn-dna">DNA</button>
        <button id="btn-torus">Torus</button>
    </div>
</div>

<div id="particle-info">
    20,000 particles<br>
    WebGL · Three.js
</div>

<div id="hint">
    ← drag to rotate →<br>
    scroll to zoom
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // --- Cursor ---
    const cursor = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursor-ring');
    let cx = 0, cy = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { cx = e.clientX; cy = e.clientY; });
    function animateCursor() {
        rx += (cx - rx) * 0.14;
        ry += (cy - ry) * 0.14;
        cursor.style.left = cx + 'px';
        cursor.style.top = cy + 'px';
        cursorRing.style.left = rx + 'px';
        cursorRing.style.top = ry + 'px';
        requestAnimationFrame(animateCursor);
    }
    animateCursor();
    document.querySelectorAll('button').forEach(b => {
        b.addEventListener('mouseenter', () => { cursorRing.style.width = '50px'; cursorRing.style.height = '50px'; cursorRing.style.borderColor = 'rgba(200,169,110,0.8)'; });
        b.addEventListener('mouseleave', () => { cursorRing.style.width = '32px'; cursorRing.style.height = '32px'; cursorRing.style.borderColor = 'rgba(200,169,110,0.5)'; });
    });

    // --- Morph bar ---
    const morphBar = document.getElementById('morph-bar');
    let morphProgress = 0, morphing = false;
    function startMorphBar() {
        morphProgress = 0;
        morphing = true;
        morphBar.style.opacity = '1';
    }
    function updateMorphBar(p) {
        morphBar.style.width = (p * 100) + '%';
        if (p >= 0.99) { morphBar.style.opacity = '0'; morphProgress = 0; morphing = false; }
    }

    // --- Three.js ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x060409, 0.0015);

    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 1000);
    camera.position.z = 160;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const particleCount = 20000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    const targetPositions = new Float32Array(particleCount * 3);
    const targetColors = new Float32Array(particleCount * 3);
    const colorObj = new THREE.Color();

    function sv(arr, i, x, y, z) { arr[i*3]=x; arr[i*3+1]=y; arr[i*3+2]=z; }
    function sc(arr, i, r, g, b) { arr[i*3]=r; arr[i*3+1]=g; arr[i*3+2]=b; }

    function generateGalaxy() {
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() * 80;
            const theta = r * 0.15 + Math.random() * Math.PI * 2;
            const x = r * Math.cos(theta) + (Math.random()-.5)*12;
            const z = r * Math.sin(theta) + (Math.random()-.5)*12;
            const y = (Math.random()-.5) * (28 - r * 0.28);
            sv(targetPositions, i, x, y, z);
            colorObj.setHSL(0.55 + r * 0.003, 0.9, 0.4 + Math.random() * 0.4);
            sc(targetColors, i, colorObj.r, colorObj.g, colorObj.b);
        }
    }

    function generateSaturn() {
        for (let i = 0; i < particleCount; i++) {
            if (i < particleCount * 0.3) {
                const phi = Math.acos(-1 + (2 * i) / (particleCount * 0.3));
                const theta = Math.sqrt(particleCount * 0.3 * Math.PI) * phi;
                const r = 30 + Math.random() * 2;
                sv(targetPositions, i, r*Math.cos(theta)*Math.sin(phi), r*Math.sin(theta)*Math.sin(phi), r*Math.cos(phi));
                colorObj.setHSL(0.08 + Math.random()*0.06, 0.7, 0.4 + Math.random()*0.25);
            } else {
                const r = 46 + Math.random() * 44;
                const theta = Math.random() * Math.PI * 2;
                sv(targetPositions, i, r*Math.cos(theta), (Math.random()-.5)*2.5, r*Math.sin(theta));
                colorObj.setHSL(0.11, 0.5, 0.5 + Math.random()*0.4);
            }
            sc(targetColors, i, colorObj.r, colorObj.g, colorObj.b);
        }
    }

    function generateFlower() {
        for (let i = 0; i < particleCount; i++) {
            const angle = i * 137.5 * (Math.PI / 180);
            const r = 4 * Math.sqrt(i);
            const z = Math.sin(r * 0.1) * 20 + Math.cos(angle * 5) * 5;
            sv(targetPositions, i, r * Math.cos(angle), r * Math.sin(angle), z);
            colorObj.setHSL(0.85 + (i/particleCount) * 0.15, 0.9, 0.5 + Math.random() * 0.3);
            sc(targetColors, i, colorObj.r, colorObj.g, colorObj.b);
        }
    }

    function generateFireworks() {
        for (let i = 0; i < particleCount; i++) {
            const phi = Math.random() * Math.PI * 2;
            const costheta = Math.random() * 2 - 1;
            const u = Math.random();
            const theta = Math.acos(costheta);
            const r = 85 * Math.cbrt(u);
            sv(targetPositions, i, r*Math.sin(theta)*Math.cos(phi), r*Math.sin(theta)*Math.sin(phi), r*Math.cos(theta));
            colorObj.setHSL(Math.random(), 1.0, 0.6 + Math.random() * 0.4);
            sc(targetColors, i, colorObj.r, colorObj.g, colorObj.b);
        }
    }

    function generateDNA() {
        for (let i = 0; i < particleCount; i++) {
            const t = (i / particleCount) * Math.PI * 30;
            const strand = i % 3;
            let x, y, z;
            if (strand === 0) {
                // Strand A
                x = Math.cos(t) * 25;
                z = Math.sin(t) * 25;
                y = t * 2.5 - 80;
                colorObj.setHSL(0.55, 0.95, 0.55 + Math.random()*0.25);
            } else if (strand === 1) {
                // Strand B (offset by π)
                x = Math.cos(t + Math.PI) * 25;
                z = Math.sin(t + Math.PI) * 25;
                y = t * 2.5 - 80;
                colorObj.setHSL(0.0, 0.95, 0.55 + Math.random()*0.25);
            } else {
                // Rungs connecting the strands
                const side = Math.random() > 0.5 ? 1 : -1;
                const frac = Math.random();
                const tRung = Math.floor(t / (Math.PI)) * Math.PI;
                x = Math.cos(tRung) * 25 * frac + Math.cos(tRung + Math.PI) * 25 * (1 - frac);
                z = Math.sin(tRung) * 25 * frac + Math.sin(tRung + Math.PI) * 25 * (1 - frac);
                y = tRung * 2.5 - 80 + (Math.random()-.5)*2;
                colorObj.setHSL(0.28, 0.8, 0.6 + Math.random()*0.2);
            }
            y = Math.max(-90, Math.min(90, y));
            sv(targetPositions, i, x, y, z);
            sc(targetColors, i, colorObj.r, colorObj.g, colorObj.b);
        }
    }

    function generateTorus() {
        const R = 50, r = 22;
        for (let i = 0; i < particleCount; i++) {
            const u = Math.random() * Math.PI * 2;
            const v = Math.random() * Math.PI * 2;
            const noise = (Math.random()-.5)*4;
            const x = (R + (r + noise)*Math.cos(v)) * Math.cos(u);
            const y = (r + noise) * Math.sin(v);
            const z = (R + (r + noise)*Math.cos(v)) * Math.sin(u);
            sv(targetPositions, i, x, y, z);
            colorObj.setHSL(0.62 + v/(Math.PI*2)*0.15, 0.85, 0.45 + Math.random()*0.35);
            sc(targetColors, i, colorObj.r, colorObj.g, colorObj.b);
        }
    }

    // Init
    generateGalaxy();
    for (let i = 0; i < particleCount * 3; i++) {
        positions[i] = targetPositions[i] + (Math.random() - 0.5) * 400;
        colors[i] = targetColors[i];
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
        size: 1.1,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        transparent: true,
        opacity: 0.88,
        depthWrite: false
    });

    const particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);

    // Mouse interaction
    let mouseX = 0, mouseY = 0;
    let isDragging = false, lastMouseX = 0, lastMouseY = 0;
    let rotVelX = 0, rotVelY = 0;
    let windowHalfX = innerWidth / 2, windowHalfY = innerHeight / 2;
    let manualRotX = 0, manualRotY = 0;
    let autoRotate = true;

    document.addEventListener('mousemove', e => {
        mouseX = (e.clientX - windowHalfX) * 0.002;
        mouseY = (e.clientY - windowHalfY) * 0.002;
        if (isDragging) {
            const dx = e.clientX - lastMouseX;
            const dy = e.clientY - lastMouseY;
            rotVelY += dx * 0.008;
            rotVelX += dy * 0.008;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }
    });
    document.addEventListener('mousedown', e => { isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY; autoRotate = false; });
    document.addEventListener('mouseup', () => { isDragging = false; });

    document.addEventListener('wheel', e => {
        camera.position.z = Math.max(60, Math.min(280, camera.position.z + e.deltaY * 0.15));
    }, { passive: true });

    document.addEventListener('touchmove', e => {
        if (e.touches.length > 0) {
            mouseX = (e.touches[0].clientX - windowHalfX) * 0.003;
            mouseY = (e.touches[0].clientY - windowHalfY) * 0.003;
        }
    }, { passive: true });

    // Buttons
    const shapeNames = {
        'btn-galaxy': 'Galaxy', 'btn-saturn': 'Saturn', 'btn-flower': 'Flower',
        'btn-fireworks': 'Fireworks', 'btn-dna': 'D·N·A', 'btn-torus': 'Torus'
    };
    const shapeFns = {
        'btn-galaxy': generateGalaxy, 'btn-saturn': generateSaturn,
        'btn-flower': generateFlower, 'btn-fireworks': generateFireworks,
        'btn-dna': generateDNA, 'btn-torus': generateTorus
    };

    Object.keys(shapeFns).forEach(id => {
        document.getElementById(id).addEventListener('click', () => {
            shapeFns[id]();
            startMorphBar();
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('current-shape').textContent = shapeNames[id];
        });
    });

    window.addEventListener('resize', () => {
        windowHalfX = innerWidth / 2; windowHalfY = innerHeight / 2;
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    let frame = 0;
    function animate() {
        requestAnimationFrame(animate);
        frame++;

        const pos = geometry.attributes.position.array;
        const col = geometry.attributes.color.array;
        let totalLerp = 0, maxDiff = 0;

        for (let i = 0; i < particleCount * 3; i++) {
            const diff = targetPositions[i] - pos[i];
            pos[i] += diff * 0.03;
            col[i] += (targetColors[i] - col[i]) * 0.05;
            if (i % 3 === 0) maxDiff = Math.max(maxDiff, Math.abs(diff));
            totalLerp += Math.abs(diff);
        }

        if (morphing) {
            const progress = 1 - Math.min(1, totalLerp / (particleCount * 30));
            updateMorphBar(progress);
        }

        geometry.attributes.position.needsUpdate = true;
        geometry.attributes.color.needsUpdate = true;

        // Inertia damping
        rotVelX *= 0.94;
        rotVelY *= 0.94;
        manualRotX += rotVelX;
        manualRotY += rotVelY;

        if (autoRotate) {
            particleSystem.rotation.y += 0.0008;
            particleSystem.rotation.x += (mouseY * 0.8 - particleSystem.rotation.x) * 0.04;
            particleSystem.rotation.y += (mouseX * 0.8 - particleSystem.rotation.y) * 0.008;
        } else {
            particleSystem.rotation.x += (manualRotX - particleSystem.rotation.x) * 0.1;
            particleSystem.rotation.y += (manualRotY - particleSystem.rotation.y) * 0.1;
            // Drift back to auto after idle
            if (!isDragging && Math.abs(rotVelX) < 0.0001 && Math.abs(rotVelY) < 0.0001) {
                autoRotate = true;
            }
        }

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
