<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora</title>
<style>*{margin:0;padding:0}body{background:#000;overflow:hidden}canvas{display:block;position:fixed;top:0;left:0}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H;
function resize(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
resize(); window.addEventListener('resize',resize);

// ─── Curtain field lines ─────────────────────────────────
// Each curtain: a gently sinusoidal path from bottom to top
const CURTAINS=[
  {bx:0.14, amp:0.06, freq:0.38, phase:0.0,  hue:145, spd:0.00012},
  {bx:0.28, amp:0.05, freq:0.42, phase:1.2,  hue:162, spd:0.00010},
  {bx:0.44, amp:0.07, freq:0.36, phase:0.6,  hue:172, spd:0.00013},
  {bx:0.60, amp:0.05, freq:0.44, phase:2.0,  hue:155, spd:0.00011},
  {bx:0.75, amp:0.06, freq:0.40, phase:1.5,  hue:148, spd:0.00009},
  {bx:0.88, amp:0.05, freq:0.35, phase:0.8,  hue:165, spd:0.00012},
];

// Compute x position along curtain at vertical fraction t (0=bottom,1=top)
function curtainX(c, t, now){
  const sway=Math.sin(now*c.spd*0.7+c.phase*1.3)*0.012; // slow lateral drift
  return W*c.bx + W*(c.amp+sway)*Math.sin(t*c.freq*Math.PI*2 + c.phase + now*c.spd);
}

// ─── Draw one curtain as smooth luminous band ────────────
const SEGS=72;
function drawCurtain(c, now, bloom, baseB){
  const flowT=now*0.00080; // upward flow speed
  ctx.globalCompositeOperation='screen';
  ctx.lineCap='round';

  // Precompute segment positions and brightness
  const xs=[], ys=[], bs=[];
  for(let i=0;i<=SEGS;i++){
    const t=i/SEGS;
    xs.push(curtainX(c, t, now));
    ys.push(H*0.98 - t*H*0.88);
    // Two overlapping flow waves = drifting brightness bands
    const flow=(Math.sin(t*Math.PI*3.5 - flowT*1.2)*0.5+0.5)*0.55
              +(Math.sin(t*Math.PI*1.5 - flowT*0.7)*0.5+0.5)*0.30
              +(Math.sin(t*Math.PI*6.0 - flowT*2.0)*0.5+0.5)*0.15;
    const hFade=Math.sin(t*Math.PI);
    bs.push(hFade*(0.30 + flow*0.70)*(baseB + bloom*1.6));
  }

  // Draw wide glow (multiple passes, increasingly crisp)
  for(const [lw,aScale] of [[45,0.035],[20,0.08],[7,0.18],[2,0.42],[0.8,0.85]]){
    for(let i=0;i<SEGS;i++){
      const b=Math.min(1,(bs[i]+bs[i+1])*0.5);
      if(b<0.005) continue;
      const sat=65+bloom*25;
      const l=45+bloom*20;
      ctx.strokeStyle=`hsla(${c.hue},${sat}%,${l}%,${aScale*b})`;
      ctx.lineWidth=lw;
      ctx.beginPath();
      ctx.moveTo(xs[i],ys[i]);
      ctx.lineTo(xs[i+1],ys[i+1]);
      ctx.stroke();
    }
  }
  ctx.globalCompositeOperation='source-over';
}

// ─── Bloom state ─────────────────────────────────────────
const CYCLE=9000;
let bloomCycle=-1, bloomHue=300, bloomLineIdx=2;

function getBloom(p){
  if(p>0.50&&p<0.74) return Math.sin((p-0.50)/0.24*Math.PI);
  return 0;
}

function drawLoop(){
  const now=performance.now();
  const p=(now%CYCLE)/CYCLE;
  const bloom=getBloom(p);

  // New cycle: pick new bloom accent color + position
  const cf=Math.floor(now/CYCLE);
  if(cf!==bloomCycle){
    bloomCycle=cf;
    bloomHue=[300,200,260,170][Math.floor(Math.random()*4)];
    bloomLineIdx=Math.floor(Math.random()*CURTAINS.length);
  }

  // Dark bg — no trail (clean each frame)
  ctx.fillStyle='#000408'; ctx.fillRect(0,0,W,H);

  // Draw baseline curtains
  for(let i=0;i<CURTAINS.length;i++){
    drawCurtain(CURTAINS[i], now, 0, 0.45);
  }

  // Bloom surge — extra bright curtain with accent color
  if(bloom>0.04){
    const bc={...CURTAINS[bloomLineIdx], hue:bloomHue, amp:CURTAINS[bloomLineIdx].amp*1.3};
    drawCurtain(bc, now, bloom*0.9, 0.7);
    // Also brighten neighbors
    if(bloomLineIdx>0) drawCurtain(CURTAINS[bloomLineIdx-1], now, bloom*0.4, 0.55);
    if(bloomLineIdx<CURTAINS.length-1) drawCurtain(CURTAINS[bloomLineIdx+1], now, bloom*0.4, 0.55);
  }

  requestAnimationFrame(drawLoop);
}
drawLoop();
</script>
</body>
</html>
