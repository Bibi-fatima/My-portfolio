<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Instrument+Serif:ital@0;1&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --surface:#141414; --surface2:#181818;
    --text:#f5f5f5; --muted:#8a8a8a; --stroke:#1f1f1f; --stroke2:#333;
    --accent1:#4FB6A5; --accent2:#4FB6A5;
    --grad:linear-gradient(90deg,#4FB6A5 0%,#4FB6A5 100%);
    --ease:cubic-bezier(.25,.1,.25,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:rgba(137,170,204,.3)}
  a{color:var(--text);text-decoration:none}
  a:hover{color:#fff}
</style>
</helmet>

<div style="position:relative;width:100%;min-height:100svh;display:flex;flex-direction:column;overflow:hidden">
  <video autoplay="" muted="" loop="" playsinline="" src="./uploads/404-particlestorm.mp4" style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85;pointer-events:none;z-index:-1"></video>

  <div style="padding:clamp(20px,4vw,32px)">
    <a href="Homepage.dc.html" title="Back to home" style="position:relative;width:34px;height:34px;border-radius:999px;display:grid;place-items:center">
      <span style="position:absolute;inset:0;border-radius:999px;background:var(--grad);padding:1.5px"></span>
      <span style="position:relative;width:100%;height:100%;border-radius:999px;background:var(--bg);display:grid;place-items:center;font-family:'Instrument Serif',serif;font-style:italic;font-size:12px;color:var(--muted)">··</span>
    </a>
  </div>

  <section style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px clamp(20px,5vw,64px) clamp(60px,9vw,90px)">
    <div style="max-width:520px;text-align:center;display:flex;flex-direction:column;align-items:center">
      <div style="font-family:ui-monospace,Menlo,monospace;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-bottom:clamp(20px,4vw,28px)">404</div>
      <h1 style="font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;font-size:clamp(1.9rem,5vw,2.9rem);line-height:1.2;letter-spacing:-.01em;margin-bottom:18px">This link led somewhere that isn't interactive yet.</h1>
      <p style="font-size:clamp(.95rem,1.6vw,1.05rem);line-height:1.6;color:var(--muted);margin-bottom:clamp(34px,5vw,44px)">Even the best experiences need a working link. This one doesn't.</p>
      <a href="Homepage.dc.html" style="display:inline-flex;align-items:center;gap:8px;border-radius:999px;background:var(--text);color:var(--bg);font-size:14px;font-weight:500;padding:14px 28px">Back to Home</a>
    </div>
  </section>

  <dc-import name="Footer" active-page="" hint-size="100%,220px"></dc-import>

</div>

</x-dc>
</body>
</html>
