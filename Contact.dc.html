<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount() {
    requestAnimationFrame(() => this.init());
  }

  q(sel) { return document.querySelector(sel); }
  qa(sel) { return Array.from(document.querySelectorAll(sel)); }

  init() {
    const homeLink = this.q('#homeNavLink');
    if (homeLink) homeLink.addEventListener('click', () => sessionStorage.setItem('hp_skip_loader', '1'));
    this.initContactShader();
    const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    const revealEls = this.qa('[data-reveal]');
    const show = (el) => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; };
    if (reduce || !('IntersectionObserver' in window)) {
      revealEls.forEach(show);
    } else {
      this._io = new IntersectionObserver((entries) => {
        entries.forEach((e) => { if (e.isIntersecting) { show(e.target); this._io.unobserve(e.target); } });
      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
      revealEls.forEach((el) => this._io.observe(el));
      setTimeout(() => revealEls.forEach(show), 4000);
    }

    const navPill = this.q('#navPill');
    window.addEventListener('scroll', () => {
      if (navPill) navPill.style.boxShadow = window.scrollY > 80 ? '0 8px 30px rgba(0,0,0,.45)' : 'none';
    }, { passive: true });
  }

  initContactShader() {
    if (typeof THREE === 'undefined') return;
    if (window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    const container = document.querySelector('#contact-shader');
    if (!container) return;
    const W = () => window.innerWidth, H = () => window.innerHeight;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, W()/H(), 0.1, 1000);
    camera.position.z = 210;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W(), H());
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    const cvs = renderer.domElement;
    cvs.style.cssText = 'position:absolute;inset:0;width:100%;height:100%';
    container.appendChild(cvs);
    window.addEventListener('resize', () => { camera.aspect = W()/H(); camera.updateProjectionMatrix(); renderer.setSize(W(), H()); }, { passive: true });
    function getGlow() {
      const c = document.createElement('canvas'); c.width = 64; c.height = 64;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(32,32,0,32,32,32);
      g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.15,'rgba(255,255,255,0.8)'); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
      return new THREE.CanvasTexture(c);
    }
    const count = 35000;
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count*3), col = new Float32Array(count*3);
    const tPos = new Float32Array(count*3), tCol = new Float32Array(count*3);
    const cObj = new THREE.Color();
    const RINGS = 8, PPR = 12;
    const perPetal = Math.floor(count * 0.92 / (RINGS * PPR));
    let idx = 0;
    for (let ring = 0; ring < RINGS; ring++) {
      const rf = ring / (RINGS - 1);
      const ringR = 12 + rf * 72, petalL = 10 + rf * 28, tilt = Math.PI * 0.42 * (1 - rf);
      for (let p = 0; p < PPR; p++) {
        const base = (p / PPR) * Math.PI * 2 + ring * (Math.PI / PPR);
        for (let k = 0; k < perPetal && idx < count; k++, idx++) {
          const t = Math.random(), hw = Math.sin(t * Math.PI) * petalL * 0.22;
          const lx = ringR + t * petalL, ly = (Math.random() - 0.5) * hw;
          const x = lx * Math.cos(base) - ly * Math.sin(base);
          const y = lx * Math.sin(base) + ly * Math.cos(base);
          const z = Math.sin(tilt) * t * petalL * 0.8 + (Math.random() - 0.5) * 3;
          tPos[idx*3] = x; tPos[idx*3+1] = y; tPos[idx*3+2] = z;
          cObj.setHSL(0.62 + rf * 0.08 + t * 0.06, 0.85 + t * 0.1, Math.min(0.38 + t * 0.38 + rf * 0.06, 0.82));
          tCol[idx*3] = cObj.r; tCol[idx*3+1] = cObj.g; tCol[idx*3+2] = cObj.b;
        }
      }
    }
    while (idx < count) {
      const a = Math.random() * Math.PI * 2, r = Math.random() * 10, z = (Math.random() - 0.5) * 12;
      tPos[idx*3] = r*Math.cos(a); tPos[idx*3+1] = r*Math.sin(a); tPos[idx*3+2] = z;
      cObj.setHSL(0.58, 1.0, 0.72);
      tCol[idx*3] = cObj.r; tCol[idx*3+1] = cObj.g; tCol[idx*3+2] = cObj.b;
      idx++;
    }
    for (let i = 0; i < count*3; i++) { pos[i] = tPos[i]*3; col[i] = tCol[i]; }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    const mat = new THREE.PointsMaterial({ size: 2.2, vertexColors: true, map: getGlow(), blending: THREE.AdditiveBlending, transparent: true, depthWrite: false });
    const sys = new THREE.Points(geo, mat);
    scene.add(sys);
    let time = 0;
    const tick = () => {
      if (!container.isConnected) return;
      requestAnimationFrame(tick);
      time += 0.008;
      const p = geo.attributes.position.array;
      for (let i = 0; i < count; i++) {
        const breath = Math.sin(time + tPos[i*3] * 0.03 + tPos[i*3+1] * 0.03) * 0.12;
        p[i*3]   += (tPos[i*3]   * (1 + breath) - p[i*3])   * 0.04;
        p[i*3+1] += (tPos[i*3+1] * (1 + breath) - p[i*3+1]) * 0.04;
        p[i*3+2] += (tPos[i*3+2] - p[i*3+2]) * 0.04;
        col[i*3]   += (tCol[i*3]   - col[i*3])   * 0.05;
        col[i*3+1] += (tCol[i*3+1] - col[i*3+1]) * 0.05;
        col[i*3+2] += (tCol[i*3+2] - col[i*3+2]) * 0.05;
      }
      geo.attributes.position.needsUpdate = true;
      geo.attributes.color.needsUpdate    = true;
      sys.rotation.z += 0.0008;
      sys.rotation.x += 0.0002;
      renderer.render(scene, camera);
    };
    tick();
  }

  renderVals() {
    return {
      openEmail: (e) => { e.preventDefault(); window.open('mailto:bibifnaaz37@gmail.com'); },
    };
  }
}

</script>
